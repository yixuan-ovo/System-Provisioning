# PS5 哔哩哔哩弹幕 + RTMP 推流（danmaku-v2）
# 启动: docker compose up -d --build

services:
  # B站弹幕转发 + Web 管理
  ps5-bilibili-danmaku:
    build: .
    image: ps5-danmaku:v2
    container_name: ps5-Danmaku
    restart: unless-stopped
    ports:
      - "15500:5000/tcp"
      - "6667:17667/tcp"
    volumes:
      - ./logs:/app/logs
      - ./data/config.json:/app/config.json
      - ./data/bili_cookies.json:/app/bili_cookies.json
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
      - LC_ALL=C.UTF-8
      - LANG=C.UTF-8
      - PYTHONWARNINGS=ignore::urllib3.connectionpool:UserWarning
      - URLLIB3_LOG_LEVEL=CRITICAL
      - LOG_LEVEL=INFO
      - TZ=Asia/Shanghai
      - DOCKER_ENV=true
      - RTMP_SERVER_HOST=ps5living
      - RTMP_SERVER_PORT=1935
    depends_on:
      ps5living:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "--max-time", "3", "http://localhost:5000/status"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  # bao3/playstation RTMP 中继（PS5 推流 → 可转发 B 站）
  ps5living:
    image: bao3/playstation
    container_name: ps5living-bao3
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
      - ./data/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80/tcp"       # PS5 部分流程会访问 80
      - "17890:80/tcp"    # RTMP 统计页（浏览器）
      - "1935:1935/tcp"   # RTMP 推流（关键）
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --timeout=3 http://127.0.0.1:80/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # RTMP 推流监控 → 写入 Web 面板
  rtmp-monitor:
    # build: .
    image: ps5-danmaku:v2
    container_name: ps5-rtmp-monitor
    restart: unless-stopped
    command: ["python", "monitor_rtmp.py"]
    # 调试: command: ["python", "monitor_rtmp_debug.py"]
    depends_on:
      ps5living:
        condition: service_healthy
      ps5-bilibili-danmaku:
        condition: service_healthy
    environment:
      - DOCKER_ENV=true
      - TZ=Asia/Shanghai
      - LOG_LEVEL=INFO
      - RTMP_SERVER_TYPE=playstation
      - RTMP_MONITOR_URL=http://ps5living:80
      - DANMAKU_API_URL=http://ps5-bilibili-danmaku:5000/api/rtmp/status/update
      - CHECK_INTERVAL=2
      - DEBUG_MODE=false
      - HTML_OUTPUT_FILE=/app/debug_output/debug_playstation.html
    volumes:
      - ./logs:/app/logs
      - ./debug_output:/app/debug_output

  # DNS 重定向（PS5 RTMP / Twitch IRC → 本机）
  dnsmasq:
    image: jpillora/dnsmasq
    container_name: ps5living-dnsmasq
    restart: unless-stopped
    volumes:
      - ./data/dnsmasq.conf:/etc/dnsmasq.conf:ro
    ports:
      - "53:53/udp"
      - "18081:8080/tcp"
    environment:
      - HTTP_USER=ytq
      - HTTP_PASS=123456

networks:
  default:
    driver: bridge
